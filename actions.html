    ru: { nav_home:"Главная", nav_actions:"99 Добрых дел", nav_confession:"Тауба", nav_whitepaper:"Whitepaper", main_title:"99 добрых дел", main_subtitle:"Сжигайте токены с намерением. Запишите ваше чтение. Каждое дело навсегда сохраняется.", completed_label:"Выполнено:", filter_all:"Все (99)", footer:"Халяльный блокчейн-банк", connect_wallet:"Подключить", video_btn:"Записать видео", audio_btn:"Записать аудио", stop_btn:"Остановить", cancel_btn:"Отмена", confirm_btn:"Подтвердить и сжечь", recording_status:"⏺ Идёт запись... Нажмите Остановить", msg_no_tokens:"Нет токенов", msg_error:"Ошибка: {error}" },
    ar: { nav_home:"الرئيسية", nav_actions:"99 عملاً صالحاً", nav_confession:"توبة", nav_whitepaper:"الورقة البيضاء", main_title:"٩٩ عملاً صالحاً", main_subtitle:"أحرق التوكنات بنية. سجل تلاوتك. كل عمل يسجل للأبد.", completed_label:"مكتمل:", filter_all:"الكل (٩٩)", footer:"بنك حلال", connect_wallet:"ربط", video_btn:"تسجيل فيديو", audio_btn:"تسجيل صوت", stop_btn:"إيقاف", cancel_btn:"إلغاء", confirm_btn:"تأكيد وحرق", recording_status:"⏺ جارٍ التسجيل... اضغط إيقاف", msg_no_tokens:"ليس لديك توكنات", msg_error:"خطأ: {error}" }
};

let wallet = null;
let walletType = null;
let currentFilter = 'all';
let currentLang = 'en';
let mediaRecorder = null;
let recordedChunks = [];
let recordingType = null;
let currentDeed = null;

function getWalletAddress() {
    if (!wallet) return null;
    if (wallet.publicKey) return wallet.publicKey.toString();
    if (wallet.selectedAddress) return wallet.selectedAddress;
    return null;
}

function updateWalletUI() {
    const t = translations[currentLang];
    const addr = getWalletAddress();
    if (addr) {
        document.getElementById('wallet-address').innerText = addr.slice(0,4) + '...' + addr.slice(-4);
    } else {
        document.getElementById('wallet-address').innerText = t.connect_wallet;
    }
}

function applyLanguage() {
    const t = translations[currentLang];
    if (!t) return;
    document.getElementById('wallet-modal-title').innerHTML = t.connect_wallet;
    document.getElementById('nav-home').innerText = t.nav_home;
    document.getElementById('nav-actions').innerText = t.nav_actions;
    document.getElementById('nav-confession').innerText = t.nav_confession;
    document.getElementById('nav-whitepaper').innerText = t.nav_whitepaper;
    document.getElementById('main-title').innerText = t.main_title;
    document.getElementById('main-subtitle').innerText = t.main_subtitle;
    document.getElementById('completed-label').innerHTML = t.completed_label;
    document.getElementById('filter-all').innerText = t.filter_all;
    document.getElementById('footer-text').innerText = t.footer;
    document.getElementById('video-btn-text').innerText = t.video_btn;
    document.getElementById('audio-btn-text').innerText = t.audio_btn;
    document.getElementById('stop-btn-text').innerText = t.stop_btn;
    document.getElementById('cancel-btn').innerText = t.cancel_btn;
    document.getElementById('confirm-btn-text').innerText = t.confirm_btn;
    document.getElementById('recording-status').innerHTML = t.recording_status;
    updateWalletUI();
}

function updateProgress() {
    let completed = JSON.parse(localStorage.getItem('completed_deeds') || '[]');
    let count = completed.length;
    document.getElementById('progress-count').innerText = count;
    document.getElementById('progress-bar').style.width = (count/99)*100 + '%';
    let badge = count >= 99 ? '🏆 Siddiq' : count >= 66 ? '📿 Abid' : count >= 33 ? '🌟 Righteous' : count >= 10 ? '🌱 Beginner' : '🕊️ Beginning';
    document.getElementById('badge-display').innerHTML = badge;
}

function renderActions() {
    let container = document.getElementById('actions-grid');
    let items = deedsList.filter(d => currentFilter === 'all' || d.type === currentFilter);
    let completed = JSON.parse(localStorage.getItem('completed_deeds') || '[]');
    const t = translations[currentLang];
    const canBurn = (wallet !== null && walletType === 'solana' && getWalletAddress() !== null);
    container.innerHTML = items.map(d => `
        <div class="bg-white rounded-xl shadow-md p-4 border-l-4 ${completed.includes(d.name) ? 'border-yellow-500 bg-yellow-50' : 'border-gray-200'}">
            <div class="flex justify-between items-start">
                <h3 class="font-bold text-sm">${d.name}</h3>
                <span class="text-xs px-2 py-1 rounded-full text-white ${d.type === 'sabu' ? 'bg-green-600' : d.type === 'muji' ? 'bg-blue-600' : 'bg-gray-800'}">${d.type.toUpperCase()}</span>
            </div>
            <div class="flex justify-between items-center mt-3">
                <span class="text-sm text-gray-500">${d.amount} ${d.type.toUpperCase()}</span>
                ${completed.includes(d.name) ? 
                    `<span class="text-green-600 text-sm"><i class="fas fa-check-circle"></i> ${t.completed_label}</span>` : 
                    (canBurn ? 
                        `<button onclick="openDeedModal('${d.name}', '${d.type}', ${d.amount}, '${d.arabic}', '${d.translation}', '${d.description}')" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">${t.completed_label === 'Выполнено:' ? 'Сжечь' : 'Burn'}</button>` :
                        `<button onclick="openWalletModal()" class="bg-gray-400 text-white px-3 py-1 rounded-lg text-sm">${t.connect_wallet}</button>`
                    )
                }
            </div>
        </div>
    `).join('');
}

function filterActions(type) { currentFilter = type; renderActions(); }

function openDeedModal(name, type, amount, arabic, translation, description) {
    currentDeed = { name, type, amount, arabic, translation, description };
    document.getElementById('deed-modal-title').innerText = name;
    document.getElementById('deed-arabic').innerHTML = arabic || '<span class="text-gray-400">(No Arabic text required)</span>';
    document.getElementById('deed-translation').innerHTML = translation || '<span class="text-gray-400">No translation needed</span>';
    document.getElementById('deed-description').innerHTML = description || 'Perform this deed with intention.';
    document.getElementById('deed-modal').classList.add('active');
    document.getElementById('confirm-deed-btn').disabled = true;
}

function closeDeedModal() { document.getElementById('deed-modal').classList.remove('active'); }

async function startVideoRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        setupRecording(stream, 'video');
        document.getElementById('video-preview').srcObject = stream;
        document.getElementById('recording-preview').classList.remove('hidden');
        document.getElementById('video-preview').classList.remove('hidden');
        document.getElementById('audio-preview').classList.add('hidden');
    } catch(e) { alert("Camera access denied"); }
}

async function startAudioRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        setupRecording(stream, 'audio');
        document.getElementById('audio-preview').srcObject = stream;
        document.getElementById('recording-preview').classList.remove('hidden');
        document.getElementById('audio-preview').classList.remove('hidden');
        document.getElementById('video-preview').classList.add('hidden');
    } catch(e) { alert("Microphone access denied"); }
}

function setupRecording(stream, type) {
    recordingType = type;
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: type === 'video' ? 'video/webm' : 'audio/webm' });
        const url = URL.createObjectURL(blob);
        if (type === 'video') { document.getElementById('video-preview').srcObject = null; document.getElementById('video-preview').src = url; }
        else { document.getElementById('audio-preview').srcObject = null; document.getElementById('audio-preview').src = url; }
        document.getElementById('stop-recording-btn').style.display = 'none';
        document.getElementById('confirm-deed-btn').disabled = false;
        document.getElementById('recording-status').classList.add('hidden');
        const reader = new FileReader();
        reader.onloadend = () => localStorage.setItem(`recording_${currentDeed.name}_${Date.now()}`, reader.result);
        reader.readAsDataURL(blob);
    };
    mediaRecorder.start(1000);
    document.getElementById('recording-status').classList.remove('hidden');
    document.getElementById('stop-recording-btn').style.display = 'block';
    document.getElementById('confirm-deed-btn').disabled = true;
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
    }
}

async function executeBurn() {
    closeDeedModal();
    const addr = getWalletAddress();
    if (!wallet || walletType !== 'solana' || !addr) { 
        openWalletModal(); 
        return; 
    }
    const t = translations[currentLang];
    if (!confirm(`📿 INTENTION: ${currentDeed.name}\nBurn ${currentDeed.amount} ${currentDeed.type.toUpperCase()}\nFor the sake of Allah. Continue?`)) return;
    try {
        const connection = await getConnection();
        const fromMint = new solanaWeb3.PublicKey(TOKENS[currentDeed.type.toUpperCase()]);
        const toSym = currentDeed.type.toUpperCase() === 'ADL' ? 'SABU' : 'ADL';
        const toAddr = new solanaWeb3.PublicKey(TOKENS[toSym]);
        const publicKey = new solanaWeb3.PublicKey(addr);
        const accounts = await connection.getTokenAccountsByOwner(publicKey, { mint: fromMint });
        if (accounts.value.length === 0) { alert(t.msg_no_tokens); return; }
        const fromATA = accounts.value[0].pubkey;
        
        const amountInSmallestUnit = BigInt(Math.floor(currentDeed.amount * Math.pow(10, 9)));
        const dataLayout = new Uint8Array(9);
        dataLayout[0] = 3;
        for (let i = 0; i < 8; i++) {
            dataLayout[1 + i] = Number((amountInSmallestUnit >> BigInt(i * 8)) & 0xFFn);
        }
        
        const tx = new solanaWeb3.Transaction().add(new solanaWeb3.TransactionInstruction({
            keys: [
                { pubkey: fromATA, isSigner: false, isWritable: true },
                { pubkey: toAddr, isSigner: false, isWritable: true },
                { pubkey: publicKey, isSigner: true, isWritable: false }
            ],
            programId: TOKEN_PROGRAM_ID,
            data: dataLayout
        }));
        const { blockhash } = await connection.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = publicKey;
        const signature = await solanaWeb3.sendAndConfirmTransaction(connection, tx, [wallet]);
        let completed = JSON.parse(localStorage.getItem('completed_deeds') || '[]');
        if (!completed.includes(currentDeed.name)) completed.push(currentDeed.name);
        localStorage.setItem('completed_deeds', JSON.stringify(completed));
        updateProgress();
        alert(`✅ DEED COMPLETED!\n${currentDeed.name}\nBurned ${currentDeed.amount} ${currentDeed.type.toUpperCase()}\nProgress: ${completed.length}/99\nTXID: ${signature.slice(0,16)}...`);
        renderActions();
    } catch(e) { alert(t.msg_error.replace("{error}", e.message)); }
}

async function connectWallet(type) {
    try {
        let provider = null;
        if (type === 'phantom') {
            if (window.solana && window.solana.isPhantom) provider = window.solana;
            else if (window.phantom && window.phantom.solana) provider = window.phantom.solana;
            else { alert("Install Phantom: https://phantom.app/"); return; }
        } else if (type === 'solflare') {
            if (window.solflare) provider = window.solflare;
            else { alert("Install Solflare: https://solflare.com/"); return; }
        } else if (type === 'backpack') {
            if (window.backpack) provider = window.backpack;
            else { alert("Install Backpack: https://backpack.app/"); return; }
        }
        await provider.connect();
        wallet = provider;
        walletType = 'solana';
        const t = translations[currentLang];
        updateWalletUI();
        closeWalletModal();
        renderActions();
    } catch(e) { alert("Error: " + e.message); }
}

function openWalletModal() { document.getElementById('wallet-modal').classList.add('active'); }
function closeWalletModal() { document.getElementById('wallet-modal').classList.remove('active'); }

document.getElementById('wallet-btn').onclick = openWalletModal;
document.getElementById('lang-select').onchange = (e) => { currentLang = e.target.value; localStorage.setItem('lang', currentLang); applyLanguage(); renderActions(); };
document.getElementById('start-video-btn').onclick = startVideoRecording;
document.getElementById('start-audio-btn').onclick = startAudioRecording;
document.getElementById('stop-recording-btn').onclick = stopRecording;
document.getElementById('confirm-deed-btn').onclick = executeBurn;

let savedLang = localStorage.getItem('lang');
if (savedLang && translations[savedLang]) currentLang = savedLang;
document.getElementById('lang-select').value = currentLang;
applyLanguage();
updateProgress();
renderActions();
</script>
