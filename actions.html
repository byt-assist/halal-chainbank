let wallet = null;
async function connectWallet(type) {
    if (type === 'phantom' && window.solana?.isPhantom) { await window.solana.connect(); wallet = window.solana; }
    else if (type === 'solflare' && window.solflare) { await window.solflare.connect(); wallet = window.solflare; }
    else if (type === 'backpack' && window.backpack) { await window.backpack.connect(); wallet = window.backpack; }
    else { alert("Установите Phantom, Solflare или Backpack"); return; }
    document.getElementById('wallet-address').innerText = wallet.publicKey.toString().slice(0,4)+'...'+wallet.publicKey.toString().slice(-4);
    closeWalletModal();
}
function openWalletModal() { document.getElementById('wallet-modal').classList.add('active'); }
function closeWalletModal() { document.getElementById('wallet-modal').classList.remove('active'); }
document.getElementById('wallet-btn').addEventListener('click', openWalletModal);

// ==================== АДРЕСА ТОКЕНОВ ====================
const TOKENS = {
    SABU: "25gGFdNrudjBqhMbLpAmvH4Y8ceuVbwBk1Kh2Kp38xaM",
    MUJI: "3umgiW7VXyKtUGwd9HpczBADxGPaxXSjUBuaBzPZ251Y",
    ADL: "8NEsFQ9PpGmZVaz5nHV1zTBWDxgrwxwvY5cJ9ejQvpdN"
};

async function burnTokens(fromSymbol, toSymbol, amount) {
    if (!wallet || !wallet.publicKey) { openWalletModal(); return; }
    const confirmed = confirm(`Сжечь ${amount} ${fromSymbol} → отправить на контракт ${toSymbol}?`);
    if (!confirmed) return;
    try {
        const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');
        const fromMint = new solanaWeb3.PublicKey(TOKENS[fromSymbol]);
        const toAddress = new solanaWeb3.PublicKey(TOKENS[toSymbol]);
        const tokenAccounts = await connection.getTokenAccountsByOwner(wallet.publicKey, { mint: fromMint });
        if (tokenAccounts.value.length === 0) { alert(`Нет ${fromSymbol} токенов`); return; }
        const fromATA = tokenAccounts.value[0].pubkey;
        const tx = new solanaWeb3.Transaction().add(
            solanaWeb3.Token.createTransferInstruction(
                solanaWeb3.TOKEN_PROGRAM_ID, fromATA, toAddress, wallet.publicKey, [], amount * Math.pow(10, 9)
            )
        );
        const sig = await solanaWeb3.sendAndConfirmTransaction(connection, tx, [wallet]);
        alert(`✅ Сожжено ${amount} ${fromSymbol} → ${toSymbol}\nTXID: ${sig.slice(0,16)}...`);
    } catch(e) { alert(`Ошибка: ${e.message}`); }
}

let currentFilter = 'all';
function filterActions(type) { currentFilter = type; renderActions(); }

function renderActions() {
    const container = document.getElementById('actions-grid');
    let items = [];
    if (currentFilter === 'all' || currentFilter === 'sabu') items.push(...actionsData.sabu.map((a,i) => ({ ...a, type: 'sabu', id: i+1 })));
    if (currentFilter === 'all' || currentFilter === 'muji') items.push(...actionsData.muji.map((a,i) => ({ ...a, type: 'muji', id: i+34 })));
    if (currentFilter === 'all' || currentFilter === 'adl') items.push(...actionsData.adl.map((a,i) => ({ ...a, type: 'adl', id: i+67 })));
    
    container.innerHTML = items.map(a => `
        <div class="bg-white rounded-xl shadow-md p-4 border-l-4 ${a.type === 'sabu' ? 'border-green-600' : a.type === 'muji' ? 'border-blue-600' : 'border-gray-800'}">
            <div class="flex justify-between items-start">
                <h3 class="font-bold text-sm md:text-base">${currentLang === 'ru' ? a.name_ru : a.name_en}</h3>
                <span class="text-xs px-2 py-1 rounded-full text-white ${a.type === 'sabu' ? 'bg-green-600' : a.type === 'muji' ? 'bg-blue-600' : 'bg-gray-800'}">${a.type.toUpperCase()}</span>
            </div>
            <div class="flex justify-between items-center mt-3">
                <span class="text-sm text-gray-500">${a.amount} ${a.type.toUpperCase()}</span>
                <button onclick="burnDeed('${a.type.toUpperCase()}', ${a.amount})" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">${translations[currentLang]?.burn || 'Сжечь'}</button>
            </div>
        </div>
    `).join('');
}

function burnDeed(symbol, amount) {
    if (!wallet || !wallet.publicKey) { openWalletModal(); return; }
    if (symbol === 'SABU') burnTokens('SABU', 'ADL', amount);
    else if (symbol === 'MUJI') burnTokens('MUJI', 'ADL', amount);
    else if (symbol === 'ADL') burnTokens('ADL', 'SABU', amount);
}

renderActions();
</script>
