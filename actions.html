// ==================== СОСТОЯНИЕ ====================
let wallet = null;
let currentFilter = 'all';
let currentLang = 'ru';

// ==================== ПРОГРЕСС ====================
function updateProgress() {
    let completed = JSON.parse(localStorage.getItem('completed_deeds') || '[]');
    let count = completed.length;
    document.getElementById('progress-count').innerText = count;
    document.getElementById('progress-bar').style.width = (count/99)*100 + '%';
    let badge = '', emoji = '';
    if (count >= 99) { badge = uiText[currentLang]?.badge_siddiq || 'Сиддик'; emoji = '🏆'; }
    else if (count >= 66) { badge = uiText[currentLang]?.badge_abid || 'Абид'; emoji = '📿'; }
    else if (count >= 33) { badge = uiText[currentLang]?.badge_righteous || 'Праведник'; emoji = '🌟'; }
    else if (count >= 10) { badge = uiText[currentLang]?.badge_beginner || 'Начинающий'; emoji = '🌱'; }
    else { badge = uiText[currentLang]?.badge_start || 'В начале пути'; emoji = '🕊️'; }
    document.getElementById('badge-display').innerHTML = `${emoji} ${badge}`;
}

// ==================== АНИМАЦИЯ ====================
function sparkle(x, y) {
    for (let i = 0; i < 12; i++) {
        let d = document.createElement('div');
        d.className = 'sparkle';
        d.style.left = (x + Math.random() * 40 - 20) + 'px';
        d.style.top = (y + Math.random() * 40 - 20) + 'px';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 600);
    }
}

function playSound() {
    let audio = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
    audio.volume = 0.3;
    audio.play().catch(e => console.log);
}

// ==================== СЖИГАНИЕ ====================
async function burnDeed(symbol, amount, deedId, deedName, btnElement) {
    if (!wallet) { openWalletModal(); return; }
    if (!confirm(`📿 НИЯТ: совершить дело "${deedName}"\nСжечь ${amount} ${symbol}\nРади довольства Аллаха.`)) return;
    
    let btn = btnElement;
    if (btn) { btn.classList.add('burn-animation'); setTimeout(() => btn.classList.remove('burn-animation'), 500); }
    
    try {
        let conn = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'), 'confirmed');
        let fromMint = new solanaWeb3.PublicKey(TOKENS[symbol]);
        let toSym = symbol === 'ADL' ? 'SABU' : 'ADL';
        let toAddr = new solanaWeb3.PublicKey(TOKENS[toSym]);
        let accounts = await conn.getTokenAccountsByOwner(wallet.publicKey, { mint: fromMint });
        if (accounts.value.length === 0) { alert(`Нет ${symbol} токенов`); return; }
        
        let tx = new solanaWeb3.Transaction().add(
            solanaWeb3.Token.createTransferInstruction(
                solanaWeb3.TOKEN_PROGRAM_ID,
                accounts.value[0].pubkey,
                toAddr,
                wallet.publicKey,
                [],
                amount * Math.pow(10, 9)
            )
        );
        let sig = await solanaWeb3.sendAndConfirmTransaction(conn, tx, [wallet]);
        
        let completed = JSON.parse(localStorage.getItem('completed_deeds') || '[]');
        if (!completed.includes(deedId)) completed.push(deedId);
        localStorage.setItem('completed_deeds', JSON.stringify(completed));
        updateProgress();
        
        let rect = btn.getBoundingClientRect();
        sparkle(rect.left + rect.width/2, rect.top + rect.height/2);
        playSound();
        
        alert(`✅ ДЕЛО ИСПОЛНЕНО!\n${deedName}\nСожжено ${amount} ${symbol}\nПрогресс: ${completed.length}/99\nTXID: ${sig.slice(0,16)}...`);
        renderActions();
    } catch(e) { alert(`Ошибка: ${e.message}`); }
}

// ==================== ОТРИСОВКА ====================
function renderActions() {
    let container = document.getElementById('actions-grid');
    let items = [];
    let completed = JSON.parse(localStorage.getItem('completed_deeds') || '[]');
    
    if (currentFilter === 'all' || currentFilter === 'sabu') {
        for (let i = 0; i < deedsData.sabu.ru.length; i++) {
            let name = deedsData.sabu[currentLang]?.[i] || deedsData.sabu.ru[i];
            items.push({ name: name, type: 'sabu', id: `sabu_${i}`, amount: amounts.sabu[i] });
        }
    }
    if (currentFilter === 'all' || currentFilter === 'muji') {
        for (let i = 0; i < deedsData.muji.ru.length; i++) {
            let name = deedsData.muji[currentLang]?.[i] || deedsData.muji.ru[i];
            items.push({ name: name, type: 'muji', id: `muji_${i}`, amount: amounts.muji[i] });
        }
    }
    if (currentFilter === 'all' || currentFilter === 'adl') {
        for (let i = 0; i < deedsData.adl.ru.length; i++) {
            let name = deedsData.adl[currentLang]?.[i] || deedsData.adl.ru[i];
            items.push({ name: name, type: 'adl', id: `adl_${i}`, amount: amounts.adl[i] });
        }
    }
    
    container.innerHTML = items.map(a => `
        <div class="bg-white rounded-xl shadow-md p-4 border-l-4 ${completed.includes(a.id) ? 'border-yellow-500 bg-yellow-50' : 'border-gray-200'}">
            <div class="flex justify-between items-start">
                <h3 class="font-bold text-sm">${a.name}</h3>
                <span class="text-xs px-2 py-1 rounded-full text-white ${a.type === 'sabu' ? 'bg-green-600' : a.type === 'muji' ? 'bg-blue-600' : 'bg-gray-800'}">${a.type.toUpperCase()}</span>
            </div>
            <div class="flex justify-between items-center mt-3">
                <span class="text-sm text-gray-500">${a.amount} ${a.type.toUpperCase()}</span>
                ${completed.includes(a.id) ? 
                    `<span class="text-green-600 text-sm"><i class="fas fa-check-circle"></i> ${uiText[currentLang]?.completed || 'Выполнено'}</span>` : 
                    `<button onclick="burnDeed('${a.type.toUpperCase()}', ${a.amount}, '${a.id}', '${a.name}', this)" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">${uiText[currentLang]?.burn || 'Сжечь'}</button>`
                }
            </div>
        </div>
    `).join('');
}

function filterActions(type) { currentFilter = type; renderActions(); }

// ==================== КОШЕЛЬКИ ====================
async function connectWallet(type) {
    if (type === 'phantom' && window.solana?.isPhantom) {
        await window.solana.connect();
        wallet = window.solana;
    } else if (type === 'solflare' && window.solflare) {
        await window.solflare.connect();
        wallet = window.solflare;
    } else if (type === 'backpack' && window.backpack) {
        await window.backpack.connect();
        wallet = window.backpack;
    } else {
        alert("Установите Phantom, Solflare или Backpack");
        return;
    }
    document.getElementById('wallet-address').innerText = wallet.publicKey.toString().slice(0,4) + '...' + wallet.publicKey.toString().slice(-4);
    closeWalletModal();
}

function openWalletModal() { document.getElementById('wallet-modal').classList.add('active'); }
function closeWalletModal() { document.getElementById('wallet-modal').classList.remove('active'); }

// ==================== ПРИМЕНЕНИЕ ЯЗЫКА ====================
function applyLanguage() {
    document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (uiText[currentLang] && uiText[currentLang][key]) {
            el.innerText = uiText[currentLang][key];
        }
    });
    updateProgress();
    renderActions();
}

// ==================== ЗАПУСК ====================
document.getElementById('wallet-btn').onclick = openWalletModal;
document.getElementById('lang-select').onchange = (e) => {
    currentLang = e.target.value;
    localStorage.setItem('lang', currentLang);
    applyLanguage();
};

let savedLang = localStorage.getItem('lang');
if (savedLang && uiText[savedLang]) currentLang = savedLang;
document.getElementById('lang-select').value = currentLang;
applyLanguage();
updateProgress();
renderActions();
