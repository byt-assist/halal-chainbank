<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@solana/web3.js@1.95.3/lib/index.iife.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #FDF5E6 0%, #F0E6D2 100%); }
        .wallet-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .wallet-modal.active { display: flex; }
        @keyframes sparkle { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes flame { 0% { text-shadow: 0 0 2px #ff6600; } 50% { text-shadow: 0 0 15px #ff3300, 0 0 5px #ffcc00; } 100% { text-shadow: 0 0 2px #ff6600; } }
        .burn-animation { animation: flame 0.3s ease-in-out; }
        .sparkle { position: fixed; pointer-events: none; z-index: 1000; width: 20px; height: 20px; background: radial-gradient(circle, gold, orange); border-radius: 50%; animation: sparkle 0.6s ease-out forwards; }
        .deed-card { transition: all 0.2s; }
        .deed-card.completed { background: linear-gradient(135deg, #FFD70020, #FFA50020); border-left: 4px solid #FFD700; }
    </style>
</head>
<body>

<!-- Wallet Modal -->
<div id="wallet-modal" class="wallet-modal">

        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold" data-key="connect_wallet">Connect Wallet</h3>
            <button onclick="closeWalletModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="space-y-2">
            <button onclick="connectWallet('phantom')" class="w-full flex items-center gap-3 p-3 border rounded-xl"><img src="https://phantom.app/img/logo.png" class="w-6 h-6"><span>Phantom</span></button>
            <button onclick="connectWallet('solflare')" class="w-full flex items-center gap-3 p-3 border rounded-xl"><i class="fas fa-globe text-orange-500"></i><span>Solflare</span></button>
            <button onclick="connectWallet('backpack')" class="w-full flex items-center gap-3 p-3 border rounded-xl"><i class="fas fa-backpack text-purple-600"></i><span>Backpack</span></button>

    </div>
</div>

<header class="bg-white shadow-md sticky top-0 z-50">

                <option value="ar">العربية</option><option value="ur">اردو</option>
                <option value="fa">فارسی</option><option value="tr">Türkçe</option>

            <button id="wallet-btn" class="bg-gray-900 text-white px-4 py-2 rounded-lg"><i class="fas fa-wallet"></i><span id="wallet-address">Подключить</span></button>

    <div class="border-t">
        <div class="container mx-auto px-4 flex gap-4">
            <a href="index.html" class="text-gray-600 py-3 px-1">Главная</a>
            <a href="actions.html" class="border-b-2 border-yellow-500 font-semibold py-3 px-1">99 Добрых дел</a>
            <a href="confession.html" class="text-gray-600 py-3 px-1">Тауба</a>
            <a href="whitepaper.html" class="text-gray-600 py-3 px-1">Whitepaper</a>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8 max-w-6xl">
    <div class="text-center mb-8">
        <i class="fas fa-praying-hands text-5xl text-yellow-600"></i>
        <h1 class="text-3xl font-bold mt-2">99 добрых дел</h1>
        <p class="text-gray-600">Сжигайте токены с намерением (ният). Каждое дело записывается в вашу книгу.</p>
    </div>

    <!-- Progress Section -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-wrap justify-between items-center">
        <div><i class="fas fa-chart-simple text-yellow-600"></i> <span class="font-semibold">Выполнено:</span> <span id="progress-count">0</span>/99</div>
        <div id="badge-display" class="bg-gray-100 px-3 py-1 rounded-full text-sm">🕊️ В начале пути</div>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-2 mb-6"><div id="progress-bar" class="bg-green-600 h-2 rounded-full" style="width:0%"></div></div>

    <!-- Filters -->
    <div class="flex justify-center gap-3 flex-wrap mb-8">
        <button onclick="filterActions('all')" class="filter-btn px-4 py-2 rounded-full bg-gray-200">Все (99)</button>
        <button onclick="filterActions('sabu')" class="filter-btn px-4 py-2 rounded-full bg-green-100 text-green-700">SABU (33)</button>
        <button onclick="filterActions('muji')" class="filter-btn px-4 py-2 rounded-full bg-blue-100 text-blue-700">MUJI (33)</button>
        <button onclick="filterActions('adl')" class="filter-btn px-4 py-2 rounded-full bg-gray-100 text-gray-700">ADL (33)</button>
    </div>

    <div id="actions-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</main>

<footer class="bg-gray-900 text-white mt-12 py-6 text-center text-sm">© 2025 Halal Chain Bank — Халяльный блокчейн-банк</footer>

<script>
// ==================== АДРЕСА ТОКЕНОВ ====================
const TOKENS = { SABU: "25gGFdNrudjBqhMbLpAmvH4Y8ceuVbwBk1Kh2Kp38xaM", MUJI: "3umgiW7VXyKtUGwd9HpczBADxGPaxXSjUBuaBzPZ251Y", ADL: "8NEsFQ9PpGmZVaz5nHV1zTBWDxgrwxwvY5cJ9ejQvpdN" };

// ==================== 99 ДЕЛ (33 SABU + 33 MUJI + 33 ADL) ====================
const actionsData = {
    sabu: [
        "Сказать Бисмиллях","Совершить вуду","1 ракаат сунны","Пожелать добра","Удержать гнев","Помочь бедному","Накормить голодного","Посетить больного","Убрать препятствие","Подарить одежду","Улыбнуться брату","Помочь путнику","Вернуть долг","Напомнить о намазе","Страница Корана","Дуа за умму","Проснуться на тахаджуд","Пост 1 день","Садака тайно","Научить полезному","Примирить ссорящихся","Защитить слабого","Быть справедливым","Не подслушивать","Хранить тайну","Выполнить обещание","Пожелать мира","Сказать истину","Избегать сплетен","Помочь сироте","Посетить мечеть","Хадж (виртуально)","Очистить 33 греха"
    ].map((n,i)=>({name_ru:n,name_en:["Bismillah","Wudu","Sunnah Rakat","Wish good","Control anger","Help poor","Feed hungry","Visit sick","Remove obstacle","Give clothes","Smile","Help traveler","Repay debt","Remind prayer","Quran page","Dua for Ummah","Tahajjud","Fast 1 day","Secret sadaqah","Teach","Reconcile","Protect weak","Be just","No eavesdrop","Keep secret","Keep promise","Wish peace","Speak truth","Avoid gossip","Help orphan","Visit mosque","Hajj virtual","Cleanse 33 sins"][i], amount:[0.1,0.5,1,0.5,2,5,5,3,1,10,0.2,2,5,0.5,2,1,3,10,5,2,10,15,5,1,2,3,0.5,1,2,20,1,100,33][i]})),
    muji: [
        "Дуа за Ахль аль-Бейт","Оплакать Кербелу","Зияр Ашура","Посетить Кербелу","Почитать имама Али","Почитать Фатиму","Почитать Хусейна","Почитать Махди","Сказать 'Яа Али'","Сказать 'Яа Хусейн'","Сказать 'Яа Захра'","Дуа о справедливости","Поминовение Ашуры","1 салават","100 салаватов","Помочь бедному шииту","Защитить общину","Посетить мечеть","Правда о Кербеле","Научить о Кербеле","Поминовение Хусейна","Дуа за скорбящих","Пожертвовать на мавзолей","Пост Ашура","Пост Арбаин","Зияр Кербелы","Такбир","Тасбих","Дуа о единстве","Уважать имамов","История имамов","Плакать по Хусейну","Очистить 33 греха"
    ].map((n,i)=>({name_ru:n,name_en:["Dua Ahl al-Bayt","Mourn Karbala","Ziyarat Ashura","Visit Karbala","Honor Imam Ali","Honor Fatima","Honor Hussein","Honor Mahdi","Ya Ali","Ya Hussain","Ya Zahra","Pray for justice","Ashura commemoration","1 Salawat","100 Salawat","Help poor Shia","Protect community","Visit mosque","Truth about Karbala","Teach about Karbala","Hussein commemoration","Pray for mourners","Donate to shrine","Ashura fast","Arba'een fast","Karbala Ziyarat","Takbir","Tasbih","Pray for unity","Respect Imams","Imams history","Cry for Hussein","Cleanse 33 sins"][i], amount:[0.5,1,2,50,1,1,2,3,0.2,0.2,0.2,1,5,0.1,5,5,20,1,2,5,3,2,10,10,10,3,0.1,0.1,1,2,5,5,33][i]})),
    adl: [
        "Простить обидчика","Примирить врагов","Сказать правду","Пожертвовать на мечеть","Помочь обиженному","Честность в сделке","Не брать взятку","Вернуть чужое","Честное свидетельство","Не обманывать","Платить вовремя","Соблюдать договор","Не нарушать обещание","Уважать старших","Заботиться о младших","Не обижать слабого","Защитить соседа","Не воровать","Не убивать","Не лжесвидетельствовать","Соблюдать закон","Платить закят","Помочь должнику","Освободить раба (вирт.)","Посадить дерево","Убрать мусор","Накормить животное","Вылечить больного","Научить детей","Построить колодец","Помочь беженцам","Защитить природу","Очистить 33 греха"
    ].map((n,i)=>({name_ru:n,name_en:["Forgive","Reconcile","Speak truth","Donate to mosque","Help wronged","Honest trade","No bribe","Return lost","Honest testimony","No cheat","Pay on time","Keep contract","Keep promise","Respect elders","Care for young","Don't harm weak","Protect neighbor","Don't steal","Don't kill","No false testimony","Obey law","Pay Zakat","Help debtor","Free slave","Plant tree","Pick up trash","Feed animal","Heal sick","Teach children","Build well","Help refugees","Protect nature","Cleanse 33 sins"][i], amount:[1,10,0.5,5,10,2,5,2,3,2,1,2,2,1,1,3,2,10,50,10,1,20,5,30,2,0.5,1,10,3,30,20,5,33][i]}))
};

let wallet = null, currentFilter = 'all', currentLang = 'ru';
const translations = { ru: { burn:"Сжечь" }, en: { burn:"Burn" }, ar: { burn:"حرق" }, ur: { burn:"جلائیں" }, fa: { burn:"سوزاندن" }, tr: { burn:"Yak" } };
function t(key) { return translations[currentLang]?.[key] || key; }

function updateProgress() {
    let completed = JSON.parse(localStorage.getItem('completed_deeds')||'[]');
    let count = completed.length;
    document.getElementById('progress-count').innerText = count;
    document.getElementById('progress-bar').style.width = (count/99)*100+'%';
    let badge = '', emoji='';
    if(count>=99){badge='Сиддик'; emoji='🏆';}else if(count>=66){badge='Абид'; emoji='📿';}else if(count>=33){badge='Праведник'; emoji='🌟';}else if(count>=10){badge='Начинающий'; emoji='🌱';}else{ badge='В начале пути'; emoji='🕊️';}
    document.getElementById('badge-display').innerHTML = `${emoji} ${badge}`;
}

function sparkle(x,y){for(let i=0;i<12;i++){let d=document.createElement('div');d.className='sparkle';d.style.left=(x+Math.random()*40-20)+'px';d.style.top=(y+Math.random()*40-20)+'px';document.body.appendChild(d);setTimeout(()=>d.remove(),600);}}
function playSound(){let audio=new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");audio.volume=0.3;audio.play().catch(e=>console.log);}

async function burnDeed(symbol, amount, deedId, deedName, btnElement){
    if(!wallet){openWalletModal();return;}
    if(!confirm(`📿 НИЯТ: совершить дело "${deedName}"\nСжечь ${amount} ${symbol}\nРади довольства Аллаха.`)) return;
    let btn=btnElement; if(btn){btn.classList.add('burn-animation'); setTimeout(()=>btn.classList.remove('burn-animation'),500);}
    try{
        let conn=new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'),'confirmed');
        let fromMint=new solanaWeb3.PublicKey(TOKENS[symbol]);
        let toSym=symbol==='ADL'?'SABU':'ADL';
        let toAddr=new solanaWeb3.PublicKey(TOKENS[toSym]);
        let accs=await conn.getTokenAccountsByOwner(wallet.publicKey,{mint:fromMint});
        if(accs.value.length===0){alert(`Нет ${symbol}`);return;}
        let tx=new solanaWeb3.Transaction().add(solanaWeb3.Token.createTransferInstruction(solanaWeb3.TOKEN_PROGRAM_ID,accs.value[0].pubkey,toAddr,wallet.publicKey,[],amount*Math.pow(10,9)));
        let sig=await solanaWeb3.sendAndConfirmTransaction(conn,tx,[wallet]);
        let completed=JSON.parse(localStorage.getItem('completed_deeds')||'[]');
        if(!completed.includes(deedId)) completed.push(deedId);
        localStorage.setItem('completed_deeds',JSON.stringify(completed));
        updateProgress();
        let rect=btn.getBoundingClientRect();
        sparkle(rect.left+rect.width/2,rect.top+rect.height/2);
        playSound();
        alert(`✅ ДЕЛО ИСПОЛНЕНО!\n${deedName}\nСожжено ${amount} ${symbol}\nПрогресс: ${completed.length}/99\nTXID: ${sig.slice(0,16)}...`);
        renderActions();
    }catch(e){alert(`Ошибка: ${e.message}`);}
}

function renderActions(){
    let container=document.getElementById('actions-grid');
    let items=[];
    let completed=JSON.parse(localStorage.getItem('completed_deeds')||'[]');
    if(currentFilter==='all'||currentFilter==='sabu') actionsData.sabu.forEach((a,i)=>{items.push({...a,type:'sabu',id:`sabu_${i}`,amount:a.amount})});
    if(currentFilter==='all'||currentFilter==='muji') actionsData.muji.forEach((a,i)=>{items.push({...a,type:'muji',id:`muji_${i}`,amount:a.amount})});
    if(currentFilter==='all'||currentFilter==='adl') actionsData.adl.forEach((a,i)=>{items.push({...a,type:'adl',id:`adl_${i}`,amount:a.amount})});
    container.innerHTML=items.map(a=>`<div class="deed-card bg-white rounded-xl shadow-md p-4 border-l-4 ${completed.includes(a.id)?'border-yellow-500 bg-yellow-50':'border-gray-200'}">
        <div class="flex justify-between items-start"><h3 class="font-bold text-sm">${currentLang==='ru'?a.name_ru:a.name_en}</h3><span class="text-xs px-2 py-1 rounded-full text-white ${a.type==='sabu'?'bg-green-600':a.type==='muji'?'bg-blue-600':'bg-gray-800'}">${a.type.toUpperCase()}</span></div>
        <div class="flex justify-between items-center mt-3"><span class="text-sm text-gray-500">${a.amount} ${a.type.toUpperCase()}</span>
        ${completed.includes(a.id)?'<span class="text-green-600 text-sm"><i class="fas fa-check-circle"></i> Выполнено</span>':`<button onclick="burnDeed('${a.type.toUpperCase()}',${a.amount},'${a.id}','${currentLang==='ru'?a.name_ru:a.name_en}',this)" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm hover:bg-red-600">${t('burn')}</button>`}</div>
    </div>`).join('');
}

function filterActions(t){currentFilter=t;renderActions();}
async function connectWallet(type){if(type==='phantom'&&window.solana?.isPhantom){await window.solana.connect();wallet=window.solana;}else{alert("Установите Phantom");return;}document.getElementById('wallet-address').innerText=wallet.publicKey.toString().slice(0,4)+'...'+wallet.publicKey.toString().slice(-4);closeWalletModal();}
function openWalletModal(){document.getElementById('wallet-modal').classList.add('active');}
function closeWalletModal(){document.getElementById('wallet-modal').classList.remove('active');}
document.getElementById('wallet-btn').onclick=openWalletModal;
document.getElementById('lang-select').onchange=(e)=>{currentLang=e.target.value;renderActions();};
updateProgress();
renderActions();
</script>
</body>
</html>
